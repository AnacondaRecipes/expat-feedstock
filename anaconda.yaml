anaconda_config_version: 1
upstream_sources:
  - github:
      identifier: libexpat/libexpat
      use_max_tag: true
      include_regex: ^R_\d+_\d+_\d+$
      from_pattern: ^R_(\d+)_(\d+)_(\d+)$
      to_pattern: \1.\2.\3
      exclude_regex: (?i)^(?=.*(?:(?<=\d)rc\d*|(?<=\d)dev\d+|(?:^|[-._])(?:alpha|beta|gamma|pre|preview)(?:\d+)?|[-._]rc\d+|(?:^|[-._])dev\d+|(?:\d+\.)+\d+[ab]\d*)).+$
    packages:
      - expat
      - libexpat
